name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Extract project
      run: |
        unzip SunmiPrinterDemo-master.zip -d temp_project
        ls -la temp_project/SunmiPrinterDemo-master/

    - name: Build Debug APK
      run: |
        cd temp_project/SunmiPrinterDemo-master
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sunmi-demo-apk
        path: temp_project/SunmiPrinterDemo-master/app/build/outputs/apk/debug/*.apk
