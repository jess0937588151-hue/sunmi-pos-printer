name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '7.5.1'

    - name: Extract and prepare project
      run: |
        unzip SunmiPrinterDemo-master.zip -d temp_project
        # Find the actual project root (contains settings.gradle or build.gradle)
        PROJECT_DIR=$(find temp_project -name "settings.gradle" -o -name "build.gradle" | head -1 | xargs dirname)
        echo "Project dir: $PROJECT_DIR"
        ls -la "$PROJECT_DIR"
        echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

    - name: Show project structure
      run: |
        echo "=== Root files ==="
        ls -la "$PROJECT_DIR"
        echo "=== App dir ==="
        ls -la "$PROJECT_DIR/app" || echo "No app dir"
        echo "=== build.gradle content ==="
        cat "$PROJECT_DIR/build.gradle" || echo "No build.gradle"

    - name: Build Debug APK
      run: |
        cd "$PROJECT_DIR"
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sunmi-demo-apk
        path: temp_project/**/app/build/outputs/apk/debug/*.apk
