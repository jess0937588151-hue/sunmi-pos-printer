plugins {
    id 'com.android.application'
}

android {
    namespace 'com.pos.sunmiprinter'
    compileSdk 28

    defaultConfig {
        applicationId "com.pos.sunmiprinter"
        minSdk 21
        targetSdk 26
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        aidl true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.android.support:appcompat-v7:28.0.0'
}
